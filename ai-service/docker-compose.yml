services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner_pass
      POSTGRES_DB: trending_scanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d trending_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scanner:scanner_pass@postgres:5432/trending_scanner
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./posts:/app/posts
      - ./reports:/app/reports
      - ./strategy:/app/strategy

volumes:
  postgres_data:
